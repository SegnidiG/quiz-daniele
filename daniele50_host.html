<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Daniele 50 — HOST</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue-dark: #020b1a;
  --blue-mid: #041230;
  --blue: #0a2060;
  --gold: #f0c040;
  --gold2: #c89a00;
  --gold-light: #fff5c0;
  --white: #ffffff;
  --radius: 14px;
}
body {
  background: radial-gradient(ellipse at center, #0a1f50 0%, #020b1a 70%);
  color: var(--white);
  font-family: 'Open Sans', sans-serif;
  min-height: 100vh;
  overflow: hidden;
}

/* STARS */
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--d) ease-in-out infinite; opacity: 0; }
@keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--op)} }

.screen { display: none; position: relative; z-index: 1; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; }
.screen.active { display: flex; }

/* LOGO / TITLE */
.show-title { font-family: 'Cinzel', serif; font-size: clamp(28px, 5vw, 56px); font-weight: 700; color: var(--gold); text-shadow: 0 0 40px rgba(240,192,64,0.6), 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 3px; margin-bottom: 0.25rem; }
.show-sub { font-family: 'Cinzel', serif; font-size: clamp(14px, 2vw, 22px); color: var(--gold-light); letter-spacing: 4px; margin-bottom: 2.5rem; opacity: 0.8; }

/* SETUP */
.setup-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(240,192,64,0.3); border-radius: var(--radius); padding: 2rem 2.5rem; max-width: 520px; width: 100%; }
.setup-box input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(240,192,64,0.4); border-radius: 10px; color: #fff; font-family: 'Open Sans', sans-serif; font-size: 14px; padding: 12px 16px; outline: none; margin-bottom: 1rem; }
.setup-box input:focus { border-color: var(--gold); }

/* BUTTONS */
.btn-gold { background: linear-gradient(135deg, #f0c040, #c89a00); color: #000; border: none; border-radius: 10px; font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; letter-spacing: 2px; padding: 14px 40px; cursor: pointer; box-shadow: 0 4px 20px rgba(240,192,64,0.4); transition: all .2s; }
.btn-gold:hover { box-shadow: 0 4px 30px rgba(240,192,64,0.7); transform: translateY(-1px); }
.btn-gold:active { transform: scale(0.97); }

/* LOBBY */
.room-code { font-family: 'Cinzel', serif; font-size: clamp(80px, 14vw, 150px); font-weight: 700; color: var(--gold); letter-spacing: 16px; line-height: 1; text-shadow: 0 0 60px rgba(240,192,64,0.5); margin: 0.5rem 0; }
.qr-box { background: #fff; border-radius: 12px; padding: 14px; display: inline-block; margin: 1rem 0; box-shadow: 0 0 30px rgba(240,192,64,0.3); }
.qr-box img { display: block; width: 180px; height: 180px; }
.players-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 700px; margin: 1rem 0; }
.player-chip { background: rgba(240,192,64,0.1); border: 1px solid rgba(240,192,64,0.5); border-radius: 100px; padding: 6px 18px; font-size: 14px; color: var(--gold-light); animation: popIn .3s ease; }
@keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

/* GAME */
.game-wrap { width: 100%; max-width: 960px; }
.game-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
.q-counter { font-family: 'Cinzel', serif; font-size: 15px; color: var(--gold); letter-spacing: 2px; }
.timer-display { font-family: 'Cinzel', serif; font-size: 52px; font-weight: 700; color: var(--gold); min-width: 70px; text-align: center; text-shadow: 0 0 20px rgba(240,192,64,0.5); transition: color .3s; }
.timer-display.urgent { color: #ff4444; text-shadow: 0 0 20px rgba(255,68,68,0.7); animation: urgentPulse .5s ease-in-out infinite; }
@keyframes urgentPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.answers-pill { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 100px; padding: 6px 18px; font-size: 14px; color: rgba(255,255,255,0.7); }

/* QUESTION */
.question-text { font-family: 'Cinzel', serif; font-size: clamp(22px, 3.5vw, 44px); font-weight: 600; line-height: 1.2; color: #fff; margin-bottom: 2.5rem; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }

/* OPTIONS — WWTBAM style hexagon-like */
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; }
.opt-btn {
  position: relative; background: linear-gradient(135deg, rgba(10,32,96,0.9), rgba(4,18,48,0.95));
  border: 2px solid rgba(240,192,64,0.5); border-radius: 50px;
  padding: 1rem 2rem; display: flex; align-items: center; gap: 16px;
  font-family: 'Open Sans', sans-serif; font-size: clamp(15px, 2vw, 20px); font-weight: 600;
  color: #fff; cursor: default; transition: all .4s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 4px 15px rgba(0,0,0,0.4);
}
.opt-btn::before { content: ''; position: absolute; inset: 0; border-radius: 50px; background: linear-gradient(135deg, rgba(240,192,64,0.05), transparent); }
.opt-letter { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; color: var(--gold); min-width: 28px; }
.opt-separator { width: 1px; height: 28px; background: rgba(240,192,64,0.3); flex-shrink: 0; }
.opt-btn.correct { background: linear-gradient(135deg, #1a5c1a, #0d3d0d); border-color: #2ecc71; box-shadow: 0 0 30px rgba(46,204,113,0.5), inset 0 1px 0 rgba(255,255,255,0.1); }
.opt-btn.wrong { background: linear-gradient(135deg, #5c1a1a, #3d0d0d); border-color: #e74c3c; box-shadow: 0 0 20px rgba(231,76,60,0.3); opacity: 0.7; }
.opt-btn.highlight { background: linear-gradient(135deg, rgba(240,192,64,0.2), rgba(200,154,0,0.2)); border-color: var(--gold); box-shadow: 0 0 30px rgba(240,192,64,0.4), inset 0 1px 0 rgba(255,255,255,0.1); animation: highlightPulse 1s ease-in-out infinite; }
@keyframes highlightPulse { 0%,100%{box-shadow:0 0 20px rgba(240,192,64,0.3)} 50%{box-shadow:0 0 50px rgba(240,192,64,0.8)} }

/* ANSWER DOTS */
.dots-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 1rem 0; }
.dot { width: 14px; height: 14px; border-radius: 50%; background: var(--gold); animation: popIn .2s ease; box-shadow: 0 0 6px rgba(240,192,64,0.6); }

/* BTN REVEAL */
.btn-reveal { background: linear-gradient(135deg, #f0c040, #c89a00); color: #000; border: none; border-radius: 50px; font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; letter-spacing: 2px; padding: 14px 48px; cursor: pointer; box-shadow: 0 4px 20px rgba(240,192,64,0.5); transition: all .2s; margin-top: 1rem; }
.btn-reveal:hover { box-shadow: 0 4px 40px rgba(240,192,64,0.8); transform: translateY(-2px); }

/* REVEAL SCREEN */
.anecdote-box { background: rgba(240,192,64,0.08); border: 1px solid rgba(240,192,64,0.4); border-left: 4px solid var(--gold); border-radius: var(--radius); padding: 1.5rem 2rem; max-width: 900px; width: 100%; font-size: clamp(15px,2vw,20px); line-height: 1.7; color: var(--gold-light); font-style: italic; margin-bottom: 2rem; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

/* LEADERBOARD */
.lb-row { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(240,192,64,0.2); border-radius: var(--radius); padding: 1rem 1.5rem; margin-bottom: 10px; width: 100%; max-width: 640px; animation: slideIn .4s ease both; }
.lb-row:nth-child(1) { border-color: var(--gold); background: rgba(240,192,64,0.1); }
.lb-row:nth-child(2) { border-color: #aaa; }
.lb-row:nth-child(3) { border-color: #a0522d; }
@keyframes slideIn { from{transform:translateX(-30px);opacity:0} to{transform:translateX(0);opacity:1} }
.lb-rank { font-family: 'Cinzel', serif; font-size: 28px; color: #888; width: 40px; }
.lb-row:nth-child(1) .lb-rank { color: var(--gold); font-size: 32px; }
.lb-name { flex: 1; font-size: 20px; font-weight: 600; text-align: left; }
.lb-score { font-family: 'Cinzel', serif; font-size: 28px; color: var(--gold); }

/* DIVIDER LINE */
.gold-line { width: 120px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 1rem auto; }

#confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div class="stars" id="stars"></div>

<!-- SETUP -->
<div id="s-setup" class="screen active">
  <div class="show-title">🎂 Quiz Daniele</div>
  <div class="show-sub">50 anni di leggenda</div>
  <div class="gold-line"></div>
  <div class="setup-box" style="margin-top:1.5rem">
    <input type="text" id="fb-url" value="https://si-la-vita-default-rtdb.europe-west1.firebasedatabase.app" placeholder="URL Firebase">
    <button class="btn-gold" onclick="setup()">Crea stanza →</button>
  </div>
  <p style="margin-top:1.5rem; font-size:13px; color:rgba(255,255,255,0.4);">Proietta questa schermata sul televisore</p>
</div>

<!-- LOBBY -->
<div id="s-lobby" class="screen">
  <div class="show-title">Chi conosce Daniele?</div>
  <div class="show-sub">Scansiona il QR o inserisci il codice</div>
  <div class="room-code" id="code-display"></div>
  <div class="qr-box"><img id="qr-img" src="" alt="QR"></div>
  <p style="font-size:13px; color:rgba(255,255,255,0.4); margin-bottom:1rem;"><span id="join-url"></span></p>
  <div class="players-grid" id="players-list"></div>
  <button class="btn-gold" style="margin-top:1rem" onclick="startGame()">▶ Inizia il quiz!</button>
</div>

<!-- GAME -->
<div id="s-game" class="screen" style="justify-content:flex-start; padding-top:2rem;">
  <div class="game-wrap">
    <div class="game-top">
      <div class="q-counter" id="q-num">Domanda 1 / 13</div>
      <div class="timer-display" id="timer">20</div>
      <div class="answers-pill" id="ans-count">0 risposte</div>
    </div>
    <div class="question-text" id="q-text"></div>
    <div class="options-grid" id="opts"></div>
    <div class="dots-row" id="dots"></div>
    <button class="btn-reveal" id="btn-reveal" onclick="reveal()" style="display:none">Rivela risposta</button>
  </div>
</div>

<!-- REVEAL -->
<div id="s-reveal" class="screen">
  <div class="anecdote-box" id="anecdote-text"></div>
  <div class="options-grid" id="opts-reveal" style="max-width:900px; width:100%; margin-bottom:2rem;"></div>
  <button class="btn-gold" id="btn-next" onclick="nextQ()">Prossima domanda →</button>
</div>

<!-- END -->
<div id="s-end" class="screen">
  <div class="show-title">🏆 Classifica Finale</div>
  <div class="gold-line"></div>
  <div id="lb-list" style="margin-top:1.5rem; width:100%; display:flex; flex-direction:column; align-items:center;"></div>
  <button class="btn-gold" style="margin-top:2rem" onclick="location.reload()">Nuova partita</button>
</div>

<script>
const Q = [
  { q: "Da piccolo, come correva Daniele secondo i suoi compagni?", opts: ["Come un ghepardo","Come una scimmietta","Come un robot","Come un centometrista"], ok: 1, story: "Le sue braccia erano così più lunghe delle gambe che quando correva aveva uno stile tutto suo... decisamente primordiale! 🐒" },
  { q: "In gita scolastica, cosa fece Daniele con la sua bottiglia d'acqua?", opts: ["La regalò a tutti","La finì subito","La vendette a bicchieri ai compagni","La dimenticò sull'autobus"], ok: 2, story: "Unico con l'acqua mentre gli altri morivano di sete, Daniele ebbe la brillante intuizione: vendere l'acqua a bicchieri. Il futuro di Wall Street era lì, in gita! 💰" },
  { q: "Daniele pianse nel 1984 per...", opts: ["La fine di un film","Una sconfitta della Roma in finale di Coppa dei Campioni","Un brutto voto a scuola","La rottura del suo motorino"], ok: 1, story: "Roma-Liverpool, finale di Coppa dei Campioni 1984. La Roma perse ai rigori in casa propria. Daniele versò lacrime amare che ancora ricorda. 🐺😢" },
  { q: "Quale film Daniele cita SEMPRE a memoria?", opts: ["Il Padrino","Pulp Fiction","Scarface","C'era una volta in America"], ok: 1, story: "Il monologo di Jules con il versetto di Ezechiele 25:17... Daniele lo sa a memoria. Almeno fino ad oggi — dopo 50 anni qualcosa potrebbe sfocarsi! 🎬" },
  { q: "Qual è la battuta cult di 'Amici miei' che Daniele cita sempre?", opts: ["La bisarca","La supercazzola","Il Mascetti bis","Il pesce d'aprile"], ok: 1, story: "«Tarapia tapioco, prematurata la supercazzola con scappellamento a destra?» — Daniele la usa con maestria nelle occasioni più improbabili. 🎭" },
  { q: "Quale squadra tifa Daniele da sempre?", opts: ["Lazio","Napoli","Roma","Juventus"], ok: 2, story: "Giallorosso nel sangue, nelle lacrime e nel cuore. Per Daniele la Roma non è una squadra: è una religione. ❤️🐺" },
  { q: "Come si potrebbe definire il rapporto di Daniele con il denaro?", opts: ["Generoso fino all'eccesso","Imprenditore con spiccato senso degli affari","Spendaccione seriale","Indifferente al denaro"], ok: 1, story: "Daniele non è avaro — ha semplicemente un acutissimo senso per gli affari. C'è differenza, ve lo assicura lui stesso. 💼😄" },
  { q: "In quale anno si svolse la finale Roma-Liverpool che fece piangere Daniele?", opts: ["1982","1983","1984","1985"], ok: 2, story: "30 maggio 1984, Stadio Olimpico di Roma. La Roma perse la sua unica finale di Coppa dei Campioni ai rigori contro il Liverpool. Una ferita ancora aperta. ⚽" },
  { q: "Chi interpreta Jules Winnfield in Pulp Fiction?", opts: ["Bruce Willis","John Travolta","Samuel L. Jackson","Harvey Keitel"], ok: 2, story: "Samuel L. Jackson nei panni di Jules Winnfield — testo che Daniele conosce meglio del codice fiscale! 📖" },
  { q: "Di quale storico trio comico Daniele è grande fan, seguito dalla Gialappa's?", opts: ["Toti e Tata","Aldo Giovanni e Giacomo","Ficarra e Picone","Boldi e De Sica"], ok: 1, story: "Aldo Giovanni e Giacomo con la voce della Gialappa's: un abbinamento perfetto che ha segnato un'epoca. E Daniele era in prima fila! 🎙️😂" },
  { q: "In quale celebre sketch la Gialappa's commentava Aldo, Giovanni e Giacomo come arbitri?", opts: ["Il Grande Fratello arbitrale","La Terna Arbitrale","Coppa Italia in famiglia","Arbitri per caso"], ok: 1, story: "La Terna Arbitrale: Aldo, Giovanni e Giacomo arbitri improvvisati, con il commento esilarante della Gialappa's. Daniele conosce ogni battuta! ⚽😂" },
  { q: "Cosa rappresenta 'Rolando' nel mondo della Gialappa's?", opts: ["Un calciatore inventato","Un portiere preso in giro in Mai dire Gol","Un arbitro famoso","Il tifoso del piano di sopra"], ok: 1, story: "I portieri e calciatori immortalati dalla Gialappa's in Mai dire Gol: Daniele sa le imitazioni meglio degli originali! 📺🤣" },
  { q: "Oggi Daniele compie...", opts: ["40 anni","45 anni","50 anni","55 anni"], ok: 2, story: "50 anni di storie, risate, lacrime giallorosse, affari geniali, supercazzole e Gialappa's! Sei una leggenda, Daniele! Auguri! 🎂🥂" }
];

const SECS = 20;
let db, room, cq = 0, tmr, players = {}, answers = {};

// Audio context
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTick() {
  try {
    const a = getAudio();
    const o = a.createOscillator();
    const g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.frequency.value = 800; o.type = 'sine';
    g.gain.setValueAtTime(0.15, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.1);
    o.start(); o.stop(a.currentTime + 0.1);
  } catch(e) {}
}

function playUrgentTick() {
  try {
    const a = getAudio();
    const o = a.createOscillator();
    const g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.frequency.value = 1100; o.type = 'square';
    g.gain.setValueAtTime(0.2, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.08);
    o.start(); o.stop(a.currentTime + 0.08);
  } catch(e) {}
}

function playCorrect() {
  try {
    const a = getAudio();
    [523, 659, 784, 1047].forEach((freq, i) => {
      const o = a.createOscillator();
      const g = a.createGain();
      o.connect(g); g.connect(a.destination);
      o.frequency.value = freq; o.type = 'sine';
      g.gain.setValueAtTime(0, a.currentTime + i * 0.12);
      g.gain.linearRampToValueAtTime(0.25, a.currentTime + i * 0.12 + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + i * 0.12 + 0.4);
      o.start(a.currentTime + i * 0.12);
      o.stop(a.currentTime + i * 0.12 + 0.4);
    });
  } catch(e) {}
}

function playApplause() {
  try {
    const a = getAudio();
    for (let i = 0; i < 80; i++) {
      const o = a.createOscillator();
      const g = a.createGain();
      o.connect(g); g.connect(a.destination);
      o.frequency.value = 200 + Math.random() * 3000;
      o.type = 'sawtooth';
      const t = a.currentTime + Math.random() * 1.5;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(Math.random() * 0.03, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.1 + Math.random() * 0.2);
      o.start(t); o.stop(t + 0.3);
    }
  } catch(e) {}
}

function playWrong() {
  try {
    const a = getAudio();
    const o = a.createOscillator();
    const g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.frequency.setValueAtTime(400, a.currentTime);
    o.frequency.linearRampToValueAtTime(150, a.currentTime + 0.5);
    o.type = 'sawtooth';
    g.gain.setValueAtTime(0.3, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.6);
    o.start(); o.stop(a.currentTime + 0.6);
  } catch(e) {}
}

function playFanfare() {
  try {
    const a = getAudio();
    const melody = [523,659,784,659,784,1047];
    melody.forEach((freq, i) => {
      const o = a.createOscillator();
      const g = a.createGain();
      o.connect(g); g.connect(a.destination);
      o.frequency.value = freq; o.type = 'triangle';
      const t = a.currentTime + i * 0.15;
      g.gain.setValueAtTime(0.3, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.start(t); o.stop(t + 0.4);
    });
  } catch(e) {}
}

// Stars background
function makeStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--op:${0.3+Math.random()*0.7};animation-delay:${Math.random()*4}s`;
    c.appendChild(s);
  }
}
makeStars();

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setup() {
  const url = document.getElementById('fb-url').value.trim();
  if (!url) return alert('Inserisci URL Firebase!');
  firebase.initializeApp({ databaseURL: url });
  db = firebase.database();
  room = Math.random().toString(36).substring(2,6).toUpperCase();
  document.getElementById('code-display').textContent = room;
  const base = location.href.replace('daniele50_host.html','daniele50_player.html');
  const joinUrl = `${base}?room=${room}&db=${encodeURIComponent(url)}`;
  document.getElementById('join-url').textContent = joinUrl;
  document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(joinUrl)}`;
  db.ref(`r/${room}`).set({ phase: 'lobby', q: -1 });
  db.ref(`r/${room}/players`).on('value', s => { players = s.val()||{}; renderPlayers(); });
  db.ref(`r/${room}/answers`).on('value', s => { answers = s.val()||{}; renderDots(); });
  show('s-lobby');
}

function renderPlayers() {
  document.getElementById('players-list').innerHTML = Object.values(players).map(p=>`<div class="player-chip">🎉 ${p.n}</div>`).join('');
}

function startGame() {
  getAudio(); // unlock audio context on user gesture
  cq = 0; loadQ();
}

function loadQ() {
  if (cq >= Q.length) { endGame(); return; }
  answers = {};
  document.getElementById('dots').innerHTML = '';
  document.getElementById('ans-count').textContent = '0 risposte';
  document.getElementById('btn-reveal').style.display = 'none';
  const item = Q[cq];
  document.getElementById('q-num').textContent = `Domanda ${cq+1} / ${Q.length}`;
  document.getElementById('q-text').textContent = item.q;
  const letters = ['A','B','C','D'];
  document.getElementById('opts').innerHTML = item.opts.map((o,i)=>`
    <div class="opt-btn" id="o${i}">
      <span class="opt-letter">${letters[i]}</span>
      <div class="opt-separator"></div>
      <span>${o}</span>
    </div>
  `).join('');
  db.ref(`r/${room}`).update({ phase:'playing', q: cq, qt: item.q, opts: item.opts });
  startTimer();
  show('s-game');
}

function renderDots() {
  const a = answers[cq]||{};
  const n = Object.keys(a).length;
  document.getElementById('dots').innerHTML = Array(n).fill('<div class="dot"></div>').join('');
  document.getElementById('ans-count').textContent = `${n} rispost${n===1?'a':'e'}`;
  if (n > 0) document.getElementById('btn-reveal').style.display = 'block';
}

function startTimer() {
  clearInterval(tmr);
  let t = SECS;
  const el = document.getElementById('timer');
  el.textContent = t;
  el.className = 'timer-display';
  tmr = setInterval(() => {
    t--;
    el.textContent = t;
    if (t <= 5) { el.className = 'timer-display urgent'; playUrgentTick(); }
    else playTick();
    if (t <= 0) {
      clearInterval(tmr);
      db.ref(`r/${room}`).update({phase:'reveal'});
      document.getElementById('btn-reveal').style.display = 'block';
    }
  }, 1000);
}

function reveal() {
  clearInterval(tmr);
  db.ref(`r/${room}`).update({ phase: 'reveal' });
  const item = Q[cq];
  const letters = ['A','B','C','D'];

  // Highlight correct first with suspense
  let i = 0;
  const highlightOrder = [0,1,2,3].filter(x => x !== item.ok);
  highlightOrder.push(item.ok);

  function highlightNext() {
    if (i < highlightOrder.length - 1) {
      const idx = highlightOrder[i];
      document.getElementById(`o${idx}`).classList.add('highlight');
      setTimeout(() => {
        document.getElementById(`o${idx}`).classList.remove('highlight');
        i++;
        setTimeout(highlightNext, 200);
      }, 400);
    } else {
      // reveal correct
      setTimeout(() => {
        item.opts.forEach((_,j) => {
          const el = document.getElementById(`o${j}`);
          el.classList.remove('highlight');
          el.classList.add(j === item.ok ? 'correct' : 'wrong');
        });
        playCorrect();
        setTimeout(() => playApplause(), 400);

        // Score
        const a = answers[cq]||{};
        Object.entries(a).forEach(([pid, ans]) => {
          if (parseInt(ans) === item.ok) db.ref(`r/${room}/players/${pid}/s`).transaction(s => (s||0)+100);
        });

        setTimeout(() => {
          document.getElementById('anecdote-text').textContent = item.story;
          document.getElementById('opts-reveal').innerHTML = item.opts.map((o,j)=>`
            <div class="opt-btn ${j===item.ok?'correct':'wrong'}">
              <span class="opt-letter">${letters[j]}</span>
              <div class="opt-separator"></div>
              <span>${o}</span>
            </div>
          `).join('');
          document.getElementById('btn-next').textContent = cq+1 < Q.length ? 'Prossima domanda →' : 'Classifica finale 🏆';
          show('s-reveal');
        }, 2000);
      }, 300);
    }
  }
  highlightNext();
}

function nextQ() { cq++; loadQ(); }

function endGame() {
  db.ref(`r/${room}`).update({ phase: 'finished' });
  const sorted = Object.values(players).sort((a,b)=>(b.s||0)-(a.s||0));
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('lb-list').innerHTML = sorted.slice(0,10).map((p,i)=>`
    <div class="lb-row" style="animation-delay:${i*0.15}s">
      <div class="lb-rank">${medals[i]||(i+1)}</div>
      <div class="lb-name">${p.n}</div>
      <div class="lb-score">${p.s||0} pt</div>
    </div>
  `).join('');
  show('s-end');
  playFanfare();
  setTimeout(() => { playApplause(); confetti(); }, 800);
}

function confetti() {
  const c = document.getElementById('confetti-canvas');
  const ctx = c.getContext('2d');
  c.width = innerWidth; c.height = innerHeight;
  const ps = Array.from({length:150},()=>({
    x:Math.random()*c.width, y:-20,
    r:Math.random()*8+4,
    col:['#f0c040','#C0392B','#2ecc71','#3498db','#e056fd','#fff'][Math.floor(Math.random()*6)],
    vx:(Math.random()-.5)*5, vy:Math.random()*5+2,
    rot:0, vr:(Math.random()-.5)*8
  }));
  function draw(){ ctx.clearRect(0,0,c.width,c.height); ps.forEach(p=>{ ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180); ctx.fillStyle=p.col; ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r); ctx.restore(); p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=0.06; }); if(ps.some(p=>p.y<c.height)) requestAnimationFrame(draw); }
  draw();
}
</script>
