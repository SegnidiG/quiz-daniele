<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Daniele 50 — HOST</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; color: #f0ede6; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
.screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; }
.screen.active { display: flex; }
h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 8vw, 96px); color: #F5C842; letter-spacing: 4px; margin-bottom: 0.5rem; }
.sub { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2rem; }
input { width: 100%; max-width: 480px; background: #1a1a1a; border: 1px solid #444; border-radius: 10px; color: #f0ede6; font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 12px 16px; outline: none; margin-bottom: 1rem; }
.btn { background: #F5C842; color: #000; border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; padding: 14px 40px; cursor: pointer; margin-top: 0.5rem; }
.btn:hover { background: #E8A800; }
.btn-outline { background: transparent; color: #F5C842; border: 2px solid #F5C842; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; padding: 12px 36px; cursor: pointer; margin-top: 1rem; }
.code { font-family: 'Bebas Neue', sans-serif; font-size: clamp(80px, 15vw, 160px); color: #fff; letter-spacing: 16px; line-height: 1; margin: 1rem 0; }
.qr { background: #fff; border-radius: 12px; padding: 14px; display: inline-block; margin: 1rem 0; }
.qr img { display: block; width: 180px; height: 180px; }
.players { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 700px; margin: 1rem 0; }
.chip { background: #1a1a1a; border: 1px solid #F5C842; border-radius: 100px; padding: 6px 18px; font-size: 14px; }
.q-header { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 900px; margin-bottom: 1.5rem; }
.q-num { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
.timer-box { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: #F5C842; width: 80px; }
.timer-box.red { color: #e74c3c; }
.ans-count { font-size: 14px; color: #888; }
.question { font-family: 'Bebas Neue', sans-serif; font-size: clamp(28px, 4vw, 56px); line-height: 1.1; color: #fff; max-width: 900px; margin-bottom: 2rem; }
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 900px; margin-bottom: 1.5rem; }
.opt { background: #1a1a1a; border: 1.5px solid #333; border-radius: 12px; padding: 1.25rem 1.5rem; font-size: 18px; font-weight: 500; display: flex; align-items: center; gap: 12px; text-align: left; }
.opt-l { background: #333; border-radius: 6px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 20px; flex-shrink: 0; }
.opt.correct { background: #1a3d1a; border-color: #2ecc71; }
.opt.correct .opt-l { background: #2ecc71; color: #000; }
.opt.wrong { background: #3d1a1a; border-color: #C0392B; }
.opt.wrong .opt-l { background: #C0392B; }
.anecdote { background: #1a1a1a; border-left: 4px solid #F5C842; border-radius: 12px; padding: 1.25rem 1.5rem; max-width: 900px; width: 100%; font-size: 16px; line-height: 1.6; color: #ccc; font-style: italic; margin-bottom: 1.5rem; }
.dots { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
.dot { width: 12px; height: 12px; border-radius: 50%; background: #F5C842; }
.lb-row { display: flex; align-items: center; gap: 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 10px; width: 100%; max-width: 600px; }
.lb-row:nth-child(1) { border-color: #F5C842; }
.lb-row:nth-child(2) { border-color: #aaa; }
.lb-row:nth-child(3) { border-color: #a0522d; }
.lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #888; width: 36px; }
.lb-name { flex: 1; font-size: 18px; font-weight: 500; text-align: left; }
.lb-score { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: #F5C842; }
#confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div id="s-setup" class="screen active">
  <h1>Quiz Daniele</h1>
  <p class="sub">50 anni di leggenda</p>
  <input type="text" id="fb-url" value="https://si-la-vita-default-rtdb.europe-west1.firebasedatabase.app" placeholder="URL Firebase">
  <button class="btn" onclick="setup()">Crea stanza →</button>
</div>

<div id="s-lobby" class="screen">
  <h1>Chi conosce Daniele?</h1>
  <p class="sub">Codice stanza</p>
  <div class="code" id="code-display"></div>
  <div class="qr"><img id="qr-img" src="" alt="QR"></div>
  <p style="color:#888; font-size:13px; margin-bottom:1rem;">oppure vai su: <span id="join-url" style="color:#F5C842"></span></p>
  <div class="players" id="players-list"></div>
  <button class="btn" onclick="startGame()">▶ Inizia il quiz!</button>
</div>

<div id="s-game" class="screen" style="justify-content: flex-start; padding-top: 2rem;">
  <div class="q-header">
    <div class="q-num" id="q-num">Domanda 1/13</div>
    <div class="timer-box" id="timer">20</div>
    <div class="ans-count" id="ans-count">0 risposte</div>
  </div>
  <div class="question" id="q-text"></div>
  <div class="options" id="opts"></div>
  <div class="dots" id="dots"></div>
  <button class="btn" id="btn-reveal" onclick="reveal()" style="display:none">Rivela risposta</button>
</div>

<div id="s-reveal" class="screen">
  <div class="anecdote" id="anecdote-text"></div>
  <div class="options" id="opts-reveal" style="max-width:900px; width:100%"></div>
  <button class="btn" id="btn-next" onclick="nextQ()">Prossima domanda →</button>
</div>

<div id="s-end" class="screen">
  <h1>🏆 Classifica finale</h1>
  <div id="lb-list"></div>
  <button class="btn-outline" onclick="location.reload()">Nuova partita</button>
</div>

<script>
const Q = [
  { q: "Da piccolo, come correva Daniele secondo i suoi compagni?", opts: ["Come un ghepardo","Come una scimmietta","Come un robot","Come un centometrista"], ok: 1, story: "Le sue braccia erano così più lunghe delle gambe che quando correva aveva uno stile tutto suo... decisamente primordiale! 🐒" },
  { q: "In gita scolastica, cosa fece Daniele con la sua bottiglia d'acqua?", opts: ["La regalò a tutti","La finì subito","La vendette a bicchieri ai compagni","La dimenticò sull'autobus"], ok: 2, story: "Unico con l'acqua mentre gli altri morivano di sete, Daniele ebbe la brillante intuizione: vendere l'acqua a bicchieri. Il futuro di Wall Street era lì, in gita! 💰" },
  { q: "Daniele pianse nel 1984 per...", opts: ["La fine di un film","Una sconfitta della Roma in finale di Coppa dei Campioni","Un brutto voto a scuola","La rottura del suo motorino"], ok: 1, story: "Roma-Liverpool, finale di Coppa dei Campioni 1984. La Roma perse ai rigori in casa propria. Daniele versò lacrime amare che ancora ricorda. 🐺😢" },
  { q: "Quale film Daniele cita SEMPRE a memoria?", opts: ["Il Padrino","Pulp Fiction","Scarface","C'era una volta in America"], ok: 1, story: "Il monologo di Jules con il versetto di Ezechiele 25:17... Daniele lo sa a memoria. Almeno fino ad oggi — dopo 50 anni qualcosa potrebbe sfocarsi! 🎬" },
  { q: "Qual è la battuta cult di 'Amici miei' che Daniele cita sempre?", opts: ["La bisarca","La supercazzola","Il Mascetti bis","Il pesce d'aprile"], ok: 1, story: "«Tarapia tapioco, prematurata la supercazzola con scappellamento a destra?» — Daniele la usa con maestria nelle occasioni più improbabili. 🎭" },
  { q: "Quale squadra tifa Daniele da sempre?", opts: ["Lazio","Napoli","Roma","Juventus"], ok: 2, story: "Giallorosso nel sangue, nelle lacrime e nel cuore. Per Daniele la Roma non è una squadra: è una religione. ❤️🐺" },
  { q: "Come si potrebbe definire il rapporto di Daniele con il denaro?", opts: ["Generoso fino all'eccesso","Imprenditore con spiccato senso degli affari","Spendaccione seriale","Indifferente al denaro"], ok: 1, story: "Daniele non è avaro — ha semplicemente un acutissimo senso per gli affari. C'è differenza, ve lo assicura lui stesso. 💼😄" },
  { q: "In quale anno si svolse la finale Roma-Liverpool che fece piangere Daniele?", opts: ["1982","1983","1984","1985"], ok: 2, story: "30 maggio 1984, Stadio Olimpico di Roma. La Roma perse la sua unica finale di Coppa dei Campioni ai rigori contro il Liverpool. Una ferita ancora aperta. ⚽" },
  { q: "Chi interpreta Jules Winnfield in Pulp Fiction?", opts: ["Bruce Willis","John Travolta","Samuel L. Jackson","Harvey Keitel"], ok: 2, story: "Samuel L. Jackson nei panni di Jules Winnfield — testo che Daniele conosce meglio del codice fiscale! 📖" },
  { q: "Di quale storico trio comico Daniele è grande fan, seguito dalla Gialappa's?", opts: ["Toti e Tata","Aldo Giovanni e Giacomo","Ficarra e Picone","Boldi e De Sica"], ok: 1, story: "Aldo Giovanni e Giacomo con la voce della Gialappa's: un abbinamento perfetto che ha segnato un'epoca. E Daniele era in prima fila! 🎙️😂" },
  { q: "In quale celebre sketch la Gialappa's commentava Aldo, Giovanni e Giacomo come arbitri?", opts: ["Il Grande Fratello arbitrale","La Terna Arbitrale","Coppa Italia in famiglia","Arbitri per caso"], ok: 1, story: "La Terna Arbitrale: Aldo, Giovanni e Giacomo arbitri improvvisati, con il commento della Gialappa's. Daniele conosce ogni battuta — quasi quanto Pulp Fiction! ⚽😂" },
  { q: "Cosa rappresenta 'Rolando' nel mondo della Gialappa's?", opts: ["Un calciatore inventato","Il portiere imbranato di Mai dire Gol","Un arbitro famoso preso in giro","Il tifoso del piano di sopra"], ok: 2, story: "I portieri e calciatori passati sotto la lente della Gialappa's in Mai dire Gol: immortalati per sempre. Daniele sa le imitazioni meglio degli originali! 📺🤣" },
  { q: "Oggi Daniele compie...", opts: ["40 anni","45 anni","50 anni","55 anni"], ok: 2, story: "50 anni di storie, risate, lacrime giallorosse, affari geniali, supercazzole e Gialappa's! Sei una leggenda, Daniele! Auguri! 🎂🥂" }
];

const SECS = 20;
let db, room, pid, cq = 0, tmr, players = {}, answers = {};

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setup() {
  const url = document.getElementById('fb-url').value.trim();
  if (!url) return alert('Inserisci URL Firebase!');
  firebase.initializeApp({ databaseURL: url });
  db = firebase.database();
  room = Math.random().toString(36).substring(2,6).toUpperCase();
  document.getElementById('code-display').textContent = room;
  const base = location.href.replace('daniele50_host.html','daniele50_player.html');
  const joinUrl = `${base}?room=${room}&db=${encodeURIComponent(url)}`;
  document.getElementById('join-url').textContent = joinUrl;
  document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(joinUrl)}`;
  db.ref(`r/${room}`).set({ phase: 'lobby', q: -1 });
  db.ref(`r/${room}/players`).on('value', s => { players = s.val()||{}; renderPlayers(); });
  db.ref(`r/${room}/answers`).on('value', s => { answers = s.val()||{}; renderDots(); });
  show('s-lobby');
}

function renderPlayers() {
  document.getElementById('players-list').innerHTML = Object.values(players).map(p=>`<div class="chip">🎉 ${p.n}</div>`).join('');
}

function startGame() {
  cq = 0;
  loadQ();
}

function loadQ() {
  if (cq >= Q.length) { endGame(); return; }
  answers = {};
  document.getElementById('dots').innerHTML = '';
  document.getElementById('ans-count').textContent = '0 risposte';
  document.getElementById('btn-reveal').style.display = 'none';
  const item = Q[cq];
  document.getElementById('q-num').textContent = `Domanda ${cq+1}/${Q.length}`;
  document.getElementById('q-text').textContent = item.q;
  const letters = ['A','B','C','D'];
  document.getElementById('opts').innerHTML = item.opts.map((o,i)=>`
    <div class="opt" id="o${i}"><div class="opt-l">${letters[i]}</div><span>${o}</span></div>
  `).join('');
  db.ref(`r/${room}`).update({ phase:'playing', q: cq, qt: item.q, opts: item.opts });
  startTimer();
  show('s-game');
}

function renderDots() {
  const a = answers[cq]||{};
  const n = Object.keys(a).length;
  document.getElementById('dots').innerHTML = Array(n).fill('<div class="dot"></div>').join('');
  document.getElementById('ans-count').textContent = `${n} rispost${n===1?'a':'e'}`;
  if (n > 0) document.getElementById('btn-reveal').style.display = 'block';
}

function startTimer() {
  clearInterval(tmr);
  let t = SECS;
  document.getElementById('timer').textContent = t;
  document.getElementById('timer').className = 'timer-box';
  tmr = setInterval(() => {
    t--;
    document.getElementById('timer').textContent = t;
    if (t <= 5) document.getElementById('timer').className = 'timer-box red';
    if (t <= 0) { clearInterval(tmr); db.ref(`r/${room}`).update({phase:'reveal'}); document.getElementById('btn-reveal').style.display = 'block'; }
  }, 1000);
}

function reveal() {
  clearInterval(tmr);
  db.ref(`r/${room}`).update({ phase: 'reveal' });
  const item = Q[cq];
  const letters = ['A','B','C','D'];
  // Score players
  const a = answers[cq]||{};
  Object.entries(a).forEach(([pid, ans]) => {
    if (parseInt(ans) === item.ok) {
      db.ref(`r/${room}/players/${pid}/s`).transaction(s => (s||0)+100);
    }
  });
  // Show reveal screen
  document.getElementById('anecdote-text').textContent = item.story;
  document.getElementById('opts-reveal').innerHTML = item.opts.map((o,i)=>`
    <div class="opt ${i===item.ok?'correct':'wrong'}"><div class="opt-l">${letters[i]}</div><span>${o}</span></div>
  `).join('');
  document.getElementById('btn-next').textContent = cq+1 < Q.length ? 'Prossima domanda →' : 'Classifica finale 🏆';
  show('s-reveal');
}

function nextQ() {
  cq++;
  loadQ();
}

function endGame() {
  db.ref(`r/${room}`).update({ phase: 'finished' });
  const sorted = Object.values(players).sort((a,b)=>(b.s||0)-(a.s||0));
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('lb-list').innerHTML = sorted.slice(0,10).map((p,i)=>`
    <div class="lb-row" style="animation-delay:${i*0.1}s">
      <div class="lb-rank">${medals[i]||(i+1)}</div>
      <div class="lb-name">${p.n}</div>
      <div class="lb-score">${p.s||0} pt</div>
    </div>
  `).join('');
  show('s-end');
  confetti();
}

function confetti() {
  const c = document.getElementById('confetti-canvas');
  const ctx = c.getContext('2d');
  c.width = innerWidth; c.height = innerHeight;
  const ps = Array.from({length:120},()=>({x:Math.random()*c.width,y:-10,r:Math.random()*8+4,col:['#F5C842','#C0392B','#2ecc71','#3498db'][Math.floor(Math.random()*4)],vx:(Math.random()-.5)*4,vy:Math.random()*4+2,rot:0,vr:(Math.random()-.5)*6}));
  function draw(){ctx.clearRect(0,0,c.width,c.height);ps.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.col;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=0.05;});if(ps.some(p=>p.y<c.height))requestAnimationFrame(draw);}
  draw();
}
</script>
</body>
</html>
