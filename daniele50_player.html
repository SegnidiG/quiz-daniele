<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quiz Daniele 50 — Gioca!</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: #0a0a0a; color: #f0ede6; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; text-align: center; overscroll-behavior: none; }
.screen { display: none; width: 100%; max-width: 420px; }
.screen.active { display: block; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: #F5C842; letter-spacing: 3px; }
.sub { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2.5rem; }
label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 6px; text-align: left; margin-top: 1rem; }
input { width: 100%; background: #1a1a1a; border: 1px solid #444; border-radius: 10px; color: #f0ede6; font-family: 'DM Sans', sans-serif; font-size: 16px; padding: 14px 16px; outline: none; }
input:focus { border-color: #F5C842; }
.btn { width: 100%; background: #F5C842; color: #000; border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; padding: 16px; cursor: pointer; margin-top: 1.5rem; }
.btn:active { background: #E8A800; transform: scale(0.97); }
.err { color: #e74c3c; font-size: 13px; margin-top: 8px; }
.pulse { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #F5C842; margin: 0 auto 1.5rem; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.5} }
.big-name { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: #F5C842; margin-bottom: 0.5rem; }
.hint { font-size: 15px; color: #888; line-height: 1.6; }
.q-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.75rem; }
.q-text { font-family: 'Bebas Neue', sans-serif; font-size: clamp(22px, 6vw, 32px); line-height: 1.2; margin-bottom: 1.5rem; color: #fff; }
.opts { display: flex; flex-direction: column; gap: 12px; }
.opt { background: #1a1a1a; border: 1.5px solid #333; border-radius: 14px; padding: 16px 20px; font-size: 16px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 14px; text-align: left; transition: border-color .15s; }
.opt:active { transform: scale(0.97); }
.opt-l { background: #333; border-radius: 6px; width: 34px; height: 34px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 20px; }
.opt.selected { background: #2a2500; border-color: #F5C842; }
.opt.selected .opt-l { background: #F5C842; color: #000; }
.opt.done { pointer-events: none; opacity: 0.5; }
.big-icon { font-size: 64px; margin-bottom: 1rem; }
.big-msg { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; margin-bottom: 0.5rem; }
.final-score { font-family: 'Bebas Neue', sans-serif; font-size: 80px; color: #F5C842; margin: 1rem 0; }
</style>
</head>
<body>

<div id="s-join" class="screen active">
  <div class="logo">🎂 Quiz</div>
  <div class="sub">Chi conosce Daniele?</div>
  <label>Il tuo nome</label>
  <input type="text" id="inp-name" placeholder="Come ti chiami?" maxlength="20" autocomplete="off">
  <label>Codice stanza</label>
  <input type="text" id="inp-room" placeholder="Es. AB12" maxlength="4" autocomplete="off" style="text-transform:uppercase; letter-spacing:3px;">
  <button class="btn" onclick="join()">Entra nel quiz →</button>
  <p class="err" id="err"></p>
</div>

<div id="s-wait" class="screen">
  <div class="pulse"></div>
  <div class="big-name" id="w-name">Ciao!</div>
  <div class="hint">In attesa che il quiz inizi...<br>Guarda lo schermo grande! 🎉</div>
</div>

<div id="s-question" class="screen">
  <div class="q-label" id="q-label">Domanda 1</div>
  <div class="q-text" id="q-text"></div>
  <div class="opts" id="opts"></div>
</div>

<div id="s-answered" class="screen">
  <div class="big-icon" id="ans-icon">✅</div>
  <div class="big-msg" id="ans-msg">Risposta inviata!</div>
  <div class="hint" id="ans-hint">In attesa... guarda lo schermo! 👀</div>
</div>

<div id="s-end" class="screen">
  <div style="font-size:48px; margin-bottom:0.5rem">🏆</div>
  <div style="font-size:14px; color:#888; text-transform:uppercase; letter-spacing:1px;">Il tuo punteggio</div>
  <div class="final-score" id="final-score">0</div>
  <div style="font-size:14px; color:#888;">punti</div>
  <p style="margin-top:2rem; color:#888; font-size:15px;">Guarda la classifica sullo schermo! 🎉</p>
</div>

<script>
const params = new URLSearchParams(location.search);
const preRoom = params.get('room') || '';
const preDb = params.get('db') || 'https://si-la-vita-default-rtdb.europe-west1.firebasedatabase.app';
if (preRoom) { document.getElementById('inp-room').value = preRoom; }

let db, pid, myName, myRoom, lastPhase = '', lastQ = -1, myAnswer = null;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function join() {
  myName = document.getElementById('inp-name').value.trim();
  myRoom = document.getElementById('inp-room').value.trim().toUpperCase();
  if (!myName) { document.getElementById('err').textContent = 'Inserisci il tuo nome!'; return; }
  if (myRoom.length < 2) { document.getElementById('err').textContent = 'Inserisci il codice stanza!'; return; }
  document.getElementById('err').textContent = '';

  if (!firebase.apps.length) firebase.initializeApp({ databaseURL: preDb });
  db = firebase.database();

  db.ref(`r/${myRoom}`).once('value').then(snap => {
    if (!snap.exists()) { document.getElementById('err').textContent = 'Stanza non trovata!'; return; }
    pid = 'p' + Date.now();
    db.ref(`r/${myRoom}/players/${pid}`).set({ n: myName, s: 0 });
    document.getElementById('w-name').textContent = `Ciao, ${myName}! 🎉`;
    show('s-wait');
    listenRoom();
  });
}

function listenRoom() {
  db.ref(`r/${myRoom}`).on('value', snap => {
    const d = snap.val();
    if (!d) return;
    const phase = d.phase;
    const q = d.q;

    if (phase === 'finished') {
      db.ref(`r/${myRoom}/players/${pid}/s`).once('value').then(s => {
        document.getElementById('final-score').textContent = s.val() || 0;
        show('s-end');
      });
      return;
    }

    if (phase === 'reveal') {
      if (myAnswer === null) {
        document.getElementById('ans-icon').textContent = '⏰';
        document.getElementById('ans-msg').textContent = 'Tempo scaduto!';
        document.getElementById('ans-hint').textContent = 'Guarda la risposta sullo schermo!';
      }
      show('s-answered');
      return;
    }

    if (phase === 'playing' && q >= 0) {
      if (q !== lastQ) {
        lastQ = q;
        myAnswer = null;
        showQuestion(d);
      }
    }
  });
}

function showQuestion(d) {
  const letters = ['A','B','C','D'];
  document.getElementById('q-label').textContent = `Domanda ${d.q + 1}`;
  document.getElementById('q-text').textContent = d.qt;
  document.getElementById('opts').innerHTML = (d.opts||[]).map((o,i) => `
    <div class="opt" id="po${i}" onclick="answer(${i})">
      <div class="opt-l">${letters[i]}</div>
      <span>${o}</span>
    </div>
  `).join('');
  show('s-question');
}

function answer(idx) {
  if (myAnswer !== null) return;
  myAnswer = idx;
  document.querySelectorAll('.opt').forEach((el,i) => {
    el.classList.add('done');
    if (i === idx) el.classList.add('selected');
  });
  db.ref(`r/${myRoom}/answers/${lastQ}/${pid}`).set(idx);
  document.getElementById('ans-icon').textContent = '✅';
  document.getElementById('ans-msg').textContent = 'Risposta inviata!';
  document.getElementById('ans-hint').textContent = 'In attesa degli altri... guarda lo schermo! 👀';
  show('s-answered');
}
</script>
</body>
</html>
